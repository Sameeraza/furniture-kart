<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FurnitureKart - Buy Furniture</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <header class="bg-blue-600 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">FurnitureKart</h1>
        </div>
    </header>

    <main class="container mx-auto p-6">
        <div id="product-list" class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <!-- Products will display here dynamically -->
        </div>
    </main>

    <script>
        async function loadProducts() {
            const res = await fetch('/api/get-products');
            const products = await res.json();
            const container = document.getElementById('product-list');
            container.innerHTML = "";

            if(products.length === 0) {
                container.innerHTML = `<p class="col-span-4 text-center text-gray-500">No products available right now.</p>`;
                return;
            }

            const whatsappNumber = "916206366989";

            products.forEach(p => {
                const message = encodeURIComponent(`Hello FurnitureKart, I am interested in:\nProduct: ${p.title}\nPrice: ₹${p.price}`);
                const whatsappUrl = `https://wa.me/${whatsappNumber}?text=${message}`;

                container.innerHTML += `
                    <div class="bg-white rounded shadow overflow-hidden flex flex-col justify-between">
                        <img src="${p.image}" class="w-full h-48 object-cover">
                        <div class="p-4">
                            <h3 class="text-lg font-semibold">${p.title}</h3>
                            <p class="text-blue-600 font-bold text-xl">₹${p.price}</p>
                            <a href="${whatsappUrl}" target="_blank" class="block text-center bg-green-500 text-white py-2 rounded mt-4 font-semibold hover:bg-green-600">
                                WhatsApp Chat
                            </a>
                        </div>
                    </div>
                `;
            });
        }
        loadProducts();
    </script>
</body>
</html>
