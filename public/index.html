<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FurnitureKart - Buy Furniture</title>
    <!-- Tailwind CSS (for styling) -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

    <!-- Header -->
    <header class="bg-blue-600 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">FurnitureKart</h1>
            <span class="text-sm">Find your best furniture</span>
        </div>
    </header>

    <!-- Products Grid -->
    <main class="container mx-auto p-6">
        <div id="product-list" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <!-- Products will display here dynamically -->
        </div>
    </main>

    <script>
        async function loadProducts() {
            try {
                // Backend se products fetch karna
                const res = await fetch('/api/get-products');
                const products = await res.json();
                const container = document.getElementById('product-list');
                container.innerHTML = "";

                if (products.length === 0) {
                    container.innerHTML = `<p class="col-span-4 text-center text-gray-500">No products available right now.</p>`;
                    return;
                }

                // Aapka India ka WhatsApp number (wa.me link me '+' lagane ki zarurat nahi hoti)
                const whatsappNumber = "916206366989"; 

                products.forEach(p => {
                    // Automatically pre-filled message create karna
                    const message = `Hello FurnitureKart, I am interested in buying this product:
-------------------------
Name: ${p.title}
Price: ₹${p.price}
-------------------------
Please share more details.`;

                    const encodedMessage = encodeURIComponent(message);
                    const whatsappUrl = `https://wa.me/${whatsappNumber}?text=${encodedMessage}`;

                    // Product Card UI
                    const productCard = `
                        <div class="bg-white rounded-lg shadow-md overflow-hidden flex flex-col justify-between p-4 hover:shadow-lg transition">
                            <img src="${p.image}" class="w-full h-48 object-cover rounded-md">
                            
                            <div class="mt-4">
                                <h3 class="text-lg font-semibold text-gray-800">${p.title}</h3>
                                
                                <!-- PRICE CLICKABLE FOR WHATSAPP INQUIRY -->
                                <a href="${whatsappUrl}" target="_blank" class="block mt-3 group cursor-pointer" title="Click price to inquire on WhatsApp">
                                    <span class="text-xs text-green-600 font-semibold block group-hover:underline">Click Price to Order:</span>
                                    <span class="text-2xl font-extrabold text-green-500 group-hover:text-green-600">
                                        ₹${p.price}
                                    </span>
                                </a>

                                <!-- Optional button for better guidance -->
                                <a href="${whatsappUrl}" target="_blank" class="block text-center bg-green-500 text-white py-2 rounded mt-4 font-semibold hover:bg-green-600 transition">
                                    Chat on WhatsApp
                                </a>
                            </div>
                        </div>
                    `;
                    container.innerHTML += productCard;
                });
            } catch (error) {
                console.error("Error loading products: ", error);
            }
        }

        // Page load hote hi products fetch karein
        loadProducts();
    </script>
</body>
</html>
